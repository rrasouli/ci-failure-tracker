apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: winc-dashboard-zstream
  labels:
    app: winc-dashboard-zstream
spec:
  output:
    to:
      kind: ImageStreamTag
      name: winc-dashboard-zstream:latest
  source:
    type: Git
    git:
      uri: https://github.com/redhat-community-ai-tools/ci-failure-tracker.git
      ref: master
    contextDir: dashboard
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  triggers:
  - type: ConfigChange
  - type: GitHub
    github:
      secretReference:
        name: webhook-secret
  - type: Generic
    generic:
      secretReference:
        name: webhook-secret
